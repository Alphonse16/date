<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you go on a date with me? 💕</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hearts-bg"></div>

    <div class="container">
        <h1>Ziyoda🤗</h1> 
        <h2>Wil you go on a date with me?💕</h2>

        <div class="gif-container">
            <img id="cat-gif" src="https://media.tenor.com/EBV7OT7ACfwAAAAj/u-u-qua-qua-u-quaa.gif" alt="cute character">
        </div>

        <div class="buttons">
            <button id="yes-btn" onclick="handleYesClick()">Yes</button>
            <button id="no-btn" onclick="handleNoClick()">No</button>
        </div>
        <div id="tease-toast"></div>
    </div>

    <audio id="bg-music" loop autoplay muted>
        <source src="https://www.youtube.com/embed/Kgz8vfA8sOk?autoplay=1&loop=1&playlist=Kgz8vfA8sOk&enablejsapi=1" type="audio/mpeg">
        <!-- <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg"> -->
    </audio>

<div id="youtube-player">
    <iframe
        id="yt-player"
        width="0"
        height="0"
        src="https://www.youtube.com/embed/Kgz8vfA8sOk?autoplay=1&loop=1&playlist=Kgz8vfA8sOk&enablejsapi=1"
        frameborder="0"
        allow="autoplay"
        allowfullscreen>
    </iframe>
</div>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

    <script src="script.js"></script>
</body>
</html>
